{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-lg rounded-4 p-4">
                <h2 class="fw-bold text-center mb-4">List Your <span class="text-primary">Property</span></h2>
                <p class="text-muted text-center mb-5">Hamare saath judiye aur apne villa ka business badhaiye.</p>
                
                <form action="/vendor-onboarding" method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Owner Name</label>
                            <input type="text" name="owner_name" class="form-control rounded-pill px-4" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Phone Number</label>
                            <input type="tel" name="phone" class="form-control rounded-pill px-4" required>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label small fw-bold">Villa Name & Address</label>
                            <input type="text" name="villa_name" class="form-control rounded-pill px-4" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Expected Daily Rent (₹)</label>
                            <input type="number" name="expected_rent" class="form-control rounded-pill px-4" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">No. of Bedrooms (BHK)</label>
                            <select name="bhk" class="form-select rounded-pill px-4">
                                <option value="2">2 BHK</option>
                                <option value="3">3 BHK</option>
                                <option value="4+">4+ BHK</option>
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label small fw-bold">Key Amenities (Pool, WiFi, AC, etc.)</label>
                            <textarea name="amenities" class="form-control rounded-4" rows="3"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold mt-4 shadow">
                        SUBMIT PROPERTY FOR REVIEW <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
