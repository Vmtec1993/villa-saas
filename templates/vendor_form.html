{% extends 'base.html' %}
{% block content %}

<style>
    .vendor-card {
        background: white;
        border-radius: 30px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        overflow: hidden;
        border: 1px solid #eee;
    }
    .vendor-header {
        background: linear-gradient(135deg, #000 0%, #222 100%);
        color: white;
        padding: 40px 30px;
        text-align: center;
    }
    .form-label {
        font-weight: 700;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #555;
        margin-bottom: 8px;
    }
    .form-control-luxe {
        border-radius: 15px;
        padding: 12px 20px;
        border: 2px solid #f0f0f0;
        transition: all 0.3s;
    }
    .form-control-luxe:focus {
        border-color: #00b4d8;
        box-shadow: 0 5px 15px rgba(0, 180, 216, 0.1);
        outline: none;
    }
    .btn-submit-luxe {
        background: #00b4d8;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 15px;
        font-weight: 800;
        letter-spacing: 1px;
        transition: all 0.3s;
    }
    .btn-submit-luxe:hover {
        background: #0077b6;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 180, 216, 0.2);
    }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="vendor-card">
                <!-- Header -->
                <div class="vendor-header">
                    <h2 class="fw-bold mb-2">Partner With MoreVistas</h2>
                    <p class="opacity-75 mb-0">Apne Villa ko hamare luxury network se jodein.</p>
                </div>

                <!-- Form Body -->
                <form action="/vendor-onboarding" method="POST" class="p-4 p-md-5">
                    <div class="row g-4">
                        <!-- Owner Info -->
                        <div class="col-md-6">
                            <label class="form-label">Full Name (Owner)</label>
                            <input type="text" name="owner_name" class="form-control form-control-luxe" placeholder="Enter your name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">WhatsApp Number</label>
                            <input type="tel" name="phone" class="form-control form-control-luxe" placeholder="+91 00000 00000" required>
                        </div>

                        <!-- Villa Info -->
                        <div class="col-md-12">
                            <label class="form-label">Villa / Property Name</label>
                            <input type="text" name="villa_name" class="form-control form-control-luxe" placeholder="e.g. Royal Azure Villa" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Location (Area)</label>
                            <input type="text" name="location" class="form-control form-control-luxe" placeholder="e.g. Tungarli, Lonavala" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Expected Daily Rent (₹)</label>
                            <input type="number" name="expected_rent" class="form-control form-control-luxe" placeholder="e.g. 15000" required>
                        </div>

                        <!-- Details -->
                        <div class="col-md-12">
                            <label class="form-label">Amenities & Special Features</label>
                            <textarea name="amenities" class="form-control form-control-luxe" rows="4" placeholder="Private Pool, 4 BHK, Chef Available, AC, etc."></textarea>
                        </div>

                        <!-- Submit -->
                        <div class="col-md-12 mt-5">
                            <button type="submit" class="btn btn-submit-luxe w-100">
                                <i class="bi bi-rocket-takeoff me-2"></i> SEND REGISTRATION REQUEST
                            </button>
                            <p class="text-center text-muted small mt-3">
                                <i class="bi bi-shield-lock me-1"></i> Your data is safe with MoreVistas Admin.
                            </p>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
