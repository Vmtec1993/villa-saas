{% extends 'base.html' %}
{% block content %}

{# --- CALENDAR CSS --- #}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<style>
    /* Premium Calendar Styling */
    .flatpickr-calendar { 
        border-radius: 20px !important; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.1) !important; 
        border: 1px solid #eee !important;
        padding: 10px;
    }
    /* Selected Range Color */
    .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange,
    .flatpickr-day.selected.inRange, .flatpickr-day.startRange.inRange, .flatpickr-day.endRange.inRange,
    .flatpickr-day.selected:focus, .flatpickr-day.startRange:focus, .flatpickr-day.endRange:focus,
    .flatpickr-day.selected:hover, .flatpickr-day.startRange:hover, .flatpickr-day.endRange:hover,
    .flatpickr-day.selected.prevMonthDay, .flatpickr-day.startRange.prevMonthDay, .flatpickr-day.endRange.prevMonthDay,
    .flatpickr-day.selected.nextMonthDay, .flatpickr-day.startRange.nextMonthDay, .flatpickr-day.endRange.nextMonthDay {
        background: #198754 !important; /* Green for Booking */
        border-color: #198754 !important;
        color: #fff !important;
    }
    .flatpickr-day.inRange {
        background: #e9f7ef !important;
        border-color: transparent !important;
        box-shadow: -5px 0 0 #e9f7ef, 5px 0 0 #e9f7ef !important;
    }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg" style="border-radius: 25px; overflow: hidden;">
                <div class="bg-dark text-white p-4 text-center">
                    <h4 class="fw-bold mb-0">Enquiry for {{ villa.Villa_Name if villa else 'MoreVistas' }}</h4>
                    <p class="small opacity-75 mb-0">Please select dates to chat on WhatsApp</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="small fw-bold text-muted">Your Name</label>
                            <input type="text" name="name" class="form-control rounded-pill px-3" placeholder="Enter your name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="small fw-bold text-muted">Phone Number</label>
                            <input type="tel" name="phone" class="form-control rounded-pill px-3" placeholder="Enter mobile number" required>
                        </div>

                        <div class="row">
                            <div class="col-md-7 mb-3">
                                <label class="small fw-bold text-muted">Travel Dates (Check-in to Out)</label>
                                {# --- Calendar Range Input --- #}
                                <input type="text" name="stay_dates" id="calendar-range" class="form-control rounded-pill px-3" placeholder="Select Dates" readonly required>
                            </div>
                            <div class="col-md-5 mb-3">
                                <label class="small fw-bold text-muted">Total Guests</label>
                                <input type="number" name="guests" class="form-control rounded-pill px-3" placeholder="No." required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 rounded-pill py-3 fw-bold mt-2 shadow">
                            <i class="bi bi-whatsapp me-2"></i> SEND & CHAT ON WHATSAPP
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{# --- CALENDAR LOGIC (JS) --- #}
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        flatpickr("#calendar-range", {
            mode: "range",          // Range selection enabled
            minDate: "today",       // Purani dates disable
            dateFormat: "d M",      // Sundar format: 26 Mar to 28 Mar
            disableMobile: "true",  
            animate: true,
            
            // Database se aane wali Booked dates ko yahan disable karein
            disable: [
                {% if villa.Sold_Dates %}
                    {% for d in villa.Sold_Dates.split(',') %} "{{ d.strip() }}", {% endfor %}
                {% endif %}
            ]
        });
    });
</script>

{% endblock %}
