{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 p-4 rounded-5">
                <h3 class="fw-bold mb-4 text-center">Complete Your <span class="text-primary">Booking</span></h3>
                <form action="/enquiry/{{ villa.Villa_ID }}" method="POST">
                    <div class="mb-3">
                        <label class="small fw-bold">Full Name</label>
                        <input type="text" name="name" class="form-control rounded-pill py-2" required placeholder="Aapka Naam">
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold">WhatsApp Number</label>
                        <input type="tel" name="phone" class="form-control rounded-pill py-2" required placeholder="Phone Number">
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold">Selected Dates</label>
                        <input type="text" name="stay_dates" id="datesInput" class="form-control rounded-pill py-2 bg-light" readonly required>
                    </div>
                    <div class="mb-4">
                        <label class="small fw-bold">Guests</label>
                        <select name="guests" class="form-select rounded-pill">
                            {% for i in range(1, 21) %}<option value="{{ i }}">{{ i }} Guests</option>{% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold">SEND ENQUIRY & CHAT ON WHATSAPP</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // ✅ Logic to get dates from URL
    const urlParams = new URLSearchParams(window.location.search);
    const dates = urlParams.get('dates');
    if (dates) { document.getElementById('datesInput').value = dates; }
</script>
{% endblock %}
