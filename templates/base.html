<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="sbNKVZ6hM4EJeasYusT6SFgEurdJ_v-kMMiXEgU-Mn0" />
    <title>{% if villa %}{{ villa.Villa_Name }} | MoreVistas Luxury{% else %}MoreVistas | Luxury Villas in Lonavala{% endif %}</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/kXM8p6YV/1000190675-removebg-preview.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --luxury-blue: #00b4d8; --hologram-gold: #e0b15c; --premium-red: #ff4757; }
        body { font-family: 'Plus Jakarta Sans', sans-serif !important; background-color: #fcfcfc; overflow-x: hidden; }
        #loader-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s ease; }
        .loader-logo { height: 100px; width: auto; animation: logo-glow 1.5s ease-in-out infinite; }
        @keyframes logo-glow { 0%, 100% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }
        .hologram-3d-text { font-weight: 800; font-size: 1.4rem; text-transform: uppercase; background: linear-gradient(135deg, #fff 0%, var(--hologram-gold) 50%, #fff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .navbar { background: #fff; border-bottom: 2px solid #eee; height: 85px; }
        .offcanvas { background-color: #000; color: white; width: 300px !important; }
        .nav-link-custom { color: rgba(255,255,255,0.8); padding: 15px 25px; border-bottom: 1px solid #222; display: block; text-decoration: none; }
        .nav-link-custom:hover { background: #111; color: var(--luxury-blue); }
        .floating-contact-wrap { position: fixed; right: 0; top: 65%; transform: translateY(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .side-btn { display: flex; align-items: center; padding: 12px 18px; color: white; text-decoration: none; border-radius: 40px 0 0 40px; font-weight: 800; transition: 0.4s; position: relative; right: -115px; width: 160px; }
        .side-btn:hover { right: 0; }
        .btn-wa { background: #25d366; } .btn-call { background: #007bff; }
        footer { background: #0a0a0a; color: white; padding: 60px 0 30px; text-align: center; }
    </style>
</head>
<body>
    <div id="loader-wrapper">
        <img src="https://i.postimg.cc/kXM8p6YV/1000190675-removebg-preview.png" class="loader-logo">
    </div>
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sideMenu">
        <div class="offcanvas-header border-bottom border-secondary">
            <img src="https://i.postimg.cc/kXM8p6YV/1000190675-removebg-preview.png" style="height: 50px;">
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0">
            <a href="/" class="nav-link-custom"><i class="bi bi-house-door me-3"></i>Home</a>
            <a href="/explore" class="nav-link-custom"><i class="bi bi-geo-alt me-3"></i>Tourist Points</a>
            <a href="/contact" class="nav-link-custom"><i class="bi bi-telephone me-3"></i>Contact Us</a>
        </div>
    </div>
    <nav class="navbar sticky-top shadow-sm">
        <div class="container-fluid d-flex align-items-center">
            <button class="btn btn-light rounded-circle me-3" data-bs-toggle="offcanvas" data-bs-target="#sideMenu"><i class="bi bi-list fs-4"></i></button>
            <a href="/" class="d-flex align-items-center text-decoration-none">
                <img src="https://i.postimg.cc/kXM8p6YV/1000190675-removebg-preview.png" style="height: 60px;">
                <span class="hologram-3d-text ms-2">MoreVistas</span>
            </a>
            <div class="ms-auto"><a href="tel:+918830024994" class="btn btn-info text-white rounded-pill px-4 fw-bold shadow-sm d-none d-md-inline">CALL NOW</a></div>
        </div>
    </nav>
    <main>{% block content %}{% endblock %}</main>
    <div class="floating-contact-wrap">
        <a href="https://wa.me/918830024994" class="side-btn btn-wa" target="_blank"><i class="bi bi-whatsapp"></i> WhatsApp</a>
        <a href="tel:+918830024994" class="side-btn btn-call"><i class="bi bi-telephone-fill"></i> Call Now</a>
    </div>
    <footer><p>© 2026 MOREVISTAS LUXURY VILLAS. ALL RIGHTS RESERVED.</p></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>window.addEventListener("load",()=> { setTimeout(()=>{ document.getElementById("loader-wrapper").style.display="none"; },1000); });</script>
</body>
</html>
