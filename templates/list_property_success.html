{% extends 'base.html' %}
{% block content %}

<style>
    .success-container {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .success-card {
        background: white;
        border-radius: 30px;
        padding: 50px 30px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        text-align: center;
        max-width: 500px;
        width: 100%;
        border: 1px solid #f0f0f0;
    }
    .icon-box {
        width: 80px;
        height: 80px;
        background: #e8f5e9;
        color: #2e7d32;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        margin: 0 auto 25px;
    }
</style>

<div class="container success-container">
    <div class="success-card">
        <div class="icon-box">
            <i class="bi bi-check-all"></i>
        </div>
        <h2 class="fw-bold mb-3">Registration Sent!</h2>
        <p class="text-muted mb-4">
            Hi <strong>{{ name }}</strong>, thank you for reaching out to MoreVistas. 
            Our vendor relations team will review your property details and contact you on WhatsApp/Call shortly.
        </p>
        <div class="d-grid gap-2">
            <a href="/" class="btn btn-dark rounded-pill py-3 fw-bold">Return to Home</a>
            <a href="https://wa.me/918830024994" class="btn btn-outline-success rounded-pill py-3 fw-bold">
                <i class="bi bi-whatsapp me-2"></i> Chat with Admin
            </a>
        </div>
    </div>
</div>

{% endblock %}
