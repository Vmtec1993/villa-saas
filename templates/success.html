{% extends 'base.html' %}
{% block content %}

<canvas id="confetti-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;"></canvas>

<div class="container text-center py-5 mb-5">
    <div class="card shadow-lg p-5 border-0 rounded-5 mx-auto bg-white position-relative overflow-hidden" style="max-width: 650px;">
        
        <div class="position-absolute top-0 start-0 w-100 h-100 opacity-25" style="background-image: radial-gradient(#0d6efd 1px, transparent 1px); background-size: 20px 20px; z-index: 0;"></div>

        <div class="position-relative" style="z-index: 1;">
            <div class="mb-4 animate-bounce">
                <div class="bg-success d-inline-flex align-items-center justify-content-center rounded-circle shadow-lg" style="width: 100px; height: 100px;">
                    <i class="bi bi-check-lg text-white" style="font-size: 4rem;"></i>
                </div>
            </div>

            <h1 class="fw-bold text-dark display-5 mb-3">Enquiry Received!</h1>
            <h4 class="text-primary fw-bold mb-4">Shukriya, {{ name }}!</h4>
            
            <div class="bg-light p-4 rounded-4 border mb-4 text-start">
                <p class="mb-2 text-muted small fw-bold text-uppercase tracking-widest">Enquiry Details:</p>
                <h5 class="fw-bold text-dark"><i class="bi bi-house-heart text-primary me-2"></i>{{ villa_name }}</h5>
                <hr class="my-3 opacity-10">
                <p class="text-secondary mb-0 small">
                    <i class="bi bi-info-circle me-1"></i> 
                    Aapki details <b>Google Sheets</b> mein save ho gayi hain aur humein <b>Telegram</b> alert mil gaya hai.
                </p>
            </div>

            <div class="alert alert-info border-0 rounded-pill d-inline-block px-4 py-2 mb-4">
                <span class="spinner-grow spinner-grow-sm me-2"></span>
                Redirecting to WhatsApp in <span id="timer" class="fw-bold">3</span> seconds...
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-center mt-2">
                <a href="/" class="btn btn-outline-dark rounded-pill px-4 fw-bold">Back to Home</a>
                <button onclick="manualRedirect()" class="btn btn-success rounded-pill px-4 fw-bold shadow">
                    Message Now <i class="bi bi-whatsapp ms-2"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    .rounded-5 { border-radius: 40px !important; }
    .animate-bounce { animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-20px); } 60% { transform: translateY(-10px); } }
    .tracking-widest { letter-spacing: 2px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
    // 1. Confetti Animation
    var duration = 3 * 1000;
    var end = Date.now() + duration;

    (function frame() {
        confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#0d6efd', '#2ed573', '#ffc107'] });
        confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#0d6efd', '#2ed573', '#ffc107'] });
        if (Date.now() < end) { requestAnimationFrame(frame); }
    }());

    // 2. Timer & Redirect Logic
    let timeLeft = 3;
    const timerElem = document.getElementById('timer');
    
    // WhatsApp Redirect URL (Aapke app.py se generate ho raha hai)
    const waUrl = "https://wa.me/918830024994?text=Hi%20MoreVistas,%20I%20just%20submitted%20an%20enquiry%20for%20{{ villa_name|urlencode }}";

    const countdown = setInterval(() => {
        timeLeft--;
        timerElem.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            window.location.href = waUrl;
        }
    }, 1000);

    function manualRedirect() { window.location.href = waUrl; }
</script>

{% endblock %}
