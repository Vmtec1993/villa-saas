{% extends 'base.html' %}
{% block content %}
<style>
    .tp-card-luxury { background: #fff; border: 1px solid #f0f0f0; border-radius: 20px; overflow: hidden; transition: 0.4s; }
    .tp-card-luxury:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
    .distance-badge { position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.9); padding: 5px 12px; border-radius: 50px; font-weight: 800; color: #00b4d8; }
    .btn-direction { background: #000; color: #fff; padding: 10px 20px; border-radius: 50px; text-decoration: none; display: block; text-align: center; }
</style>

<div class="container py-5">
    <h2 class="text-center fw-bold mb-5">Lonavala’s Treasures</h2>
    <div class="row g-4">
        {% for place in tourist_places %}
        <div class="col-md-6 col-lg-4">
            <div class="tp-card-luxury position-relative h-100">
                <img src="{{ place.Image_URL }}" class="w-100" style="height: 220px; object-fit: cover;">
                <div class="distance-badge small"><i class="bi bi-geo-alt-fill"></i> {{ place.Distance }}</div>
                <div class="p-4">
                    <h5 class="fw-bold">{{ place.Location }}</h5>
                    <p class="text-muted small">{{ place.Description }}</p>
                    <a href="{{ place.Map_Link }}" target="_blank" class="btn-direction small fw-bold">GET DIRECTIONS</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
