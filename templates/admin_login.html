<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | MoreVistas Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-gold: #e0b15c;
            --deep-black: #0f172a;
        }
        body {
            background: radial-gradient(circle at center, #1e293b 0%, var(--deep-black) 100%);
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fff;
            margin: 0;
        }
        /* Glassmorphism Effect */
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 45px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 100%; max-width: 420px;
            text-align: center;
            transition: 0.4s ease;
        }
        .login-card:hover {
            border-color: rgba(224, 177, 92, 0.3);
        }
        .brand-logo { height: 70px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(224, 177, 92, 0.2)); }
        
        .hologram-text {
            font-weight: 800; font-size: 1.8rem; letter-spacing: 1px;
            background: linear-gradient(135deg, #fff 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .form-label { color: rgba(255,255,255,0.6); letter-spacing: 1px; text-transform: uppercase; font-size: 0.7rem; }
        
        .input-group { background: rgba(255,255,255,0.05); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .input-group-text { background: transparent; border: none; color: var(--accent-gold); padding-left: 20px; }
        
        .form-control { 
            background: transparent; border: none; color: #fff; padding: 15px; font-size: 0.95rem;
        }
        .form-control:focus { background: transparent; color: #fff; box-shadow: none; }
        .form-control::placeholder { color: rgba(255,255,255,0.2); }

        .btn-login {
            background: linear-gradient(45deg, var(--accent-gold), #b38a41);
            border: none; border-radius: 15px; color: #000;
            padding: 15px; font-weight: 800; width: 100%;
            margin-top: 25px; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(224, 177, 92, 0.3); opacity: 0.9; }
        
        .back-link { font-size: 0.8rem; text-decoration: none; color: rgba(255,255,255,0.4); display: block; margin-top: 25px; transition: 0.3s; }
        .back-link:hover { color: var(--accent-gold); }

        .error-msg { 
            font-size: 0.8rem; color: #ff6b6b; background: rgba(255, 107, 107, 0.1); 
            padding: 12px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255, 107, 107, 0.2);
        }

        /* Subtle Animation */
        .glow-point {
            position: absolute; width: 300px; height: 300px;
            background: var(--accent-gold); filter: blur(150px);
            opacity: 0.05; z-index: -1;
        }
    </style>
</head>
<body>

<div class="glow-point" style="top: 10%; left: 10%;"></div>
<div class="glow-point" style="bottom: 10%; right: 10%;"></div>

<div class="login-card">
    <img src="https://i.postimg.cc/kXM8p6YV/1000190675-removebg-preview.png" class="brand-logo" alt="Logo">
    <div class="mb-4">
        <h2 class="hologram-text mb-0">MoreVistas</h2>
        <p style="font-size: 0.6rem; color: var(--accent-gold); letter-spacing: 4px; font-weight: 700;">COMMAND CENTER</p>
    </div>

    {% if error %}
    <div class="error-msg text-start">
        <i class="bi bi-shield-lock-fill me-2"></i> {{ error }}
    </div>
    {% endif %}

    <form action="/admin-login" method="POST">
        <div class="text-start mb-3">
            <label class="form-label fw-bold">Identification</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Admin ID" required>
            </div>
        </div>

        <div class="text-start mb-4">
            <label class="form-label fw-bold">Access Key</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-key"></i></span>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-login">Authorize Access</button>
    </form>

    <a href="/" class="back-link"><i class="bi bi-chevron-left me-1"></i> Return to Terminal</a>
</div>

</body>
</html>
