<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MoreVistas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.8);
        }
        .form-control { border-radius: 15px; padding: 12px; border: 1px solid #eee; background: #fcfcfc; font-size: 0.95rem; }
        .form-control:focus { box-shadow: 0 0 10px rgba(13, 110, 253, 0.1); border-color: #0d6efd; }
        .btn-login {
            background: #0d6efd; border: none; border-radius: 15px;
            padding: 14px; font-weight: 700; width: 100%;
            margin-top: 20px; transition: 0.3s;
        }
        .btn-login:hover { background: #0b5ed7; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(13, 110, 253, 0.2); }
        .error-msg { font-size: 0.85rem; color: #dc3545; background: #ffe5e5; padding: 10px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <img src="https://i.postimg.cc/kXM8p6YV/1000190675-removebg-preview.png" style="height: 60px;" class="mb-3">
        <h3 class="fw-bold m-0">Admin <span class="text-primary">Portal</span></h3>
        <p class="text-muted small">Enter your credentials to manage MoreVistas</p>
    </div>

    {% if error %}
    <div class="error-msg"><i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}</div>
    {% endif %}

    <form action="/admin-login" method="POST">
        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">USERNAME</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-person text-muted"></i></span>
                <input type="text" name="username" class="form-control border-start-0" placeholder="admin_username" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold text-muted">PASSWORD</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-login">Login Securely</button>
    </form>

    <div class="text-center mt-4">
        <a href="/" class="text-decoration-none small text-muted"><i class="bi bi-arrow-left me-1"></i> Back to Live Site</a>
    </div>
</div>

</body>
</html>
