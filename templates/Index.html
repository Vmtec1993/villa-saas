<!DOCTYPE html>
<html>
<head>
<title>Villa SaaS</title>
</head>
<body>

<h2>🏡 Villas</h2>

<a href="/login-page"><button>Login</button></a>

<h3>Add Villa</h3>
<input id="name" placeholder="Villa Name">
<input id="price" placeholder="Price">
<button onclick="addVilla()">Add</button>

<hr>

{% for v in villas %}
<div>
    <h3>{{ v.name }}</h3>
    <p>₹{{ v.price }}</p>
    <button onclick="book('{{ v.name }}')">Book</button>
</div>
{% endfor %}

<script>
function addVilla(){
    fetch('/add-villa',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            name: name.value,
            price: price.value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.msg);
        location.reload();
    });
}

function book(villa){
    let name = prompt("Your Name");
    let date = prompt("Date");

    fetch('/book',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            villa: villa,
            name: name,
            date: date
        })
    })
    .then(res=>res.json())
    .then(data=>{
        alert("Booked 💰");
    });
}
</script>

</body>
</html>
