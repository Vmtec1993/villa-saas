<!DOCTYPE html>
<html>
<head>
<title>Villa SaaS</title>
<style>
body { font-family: Arial; text-align:center; }
.card {
    border:1px solid #ddd;
    margin:10px;
    padding:10px;
}
</style>
</head>

<body>

<h1>🏡 Villa SaaS LIVE</h1>

<a href="/login-page"><button>Login</button></a>

<h2>Add Villa</h2>

<input id="name" placeholder="Villa Name"><br><br>
<input id="price" placeholder="Price"><br><br>

<button onclick="addVilla()">Add Villa</button>

<hr>

<h2>All Villas</h2>

{% for v in villas %}
<div class="card">
    <h3>{{ v.name }}</h3>
    <p>₹{{ v.price }}</p>
    <button onclick="book('{{ v.name }}')">Book</button>
</div>
{% endfor %}

<script>
function addVilla(){
    fetch('/add-villa',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            name: document.getElementById('name').value,
            price: document.getElementById('price').value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.msg);
        location.reload();
    });
}

function book(villa){
    let name = prompt("Your Name");
    let date = prompt("Date");

    fetch('/book',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            villa: villa,
            name: name,
            date: date
        })
    })
    .then(res=>res.json())
    .then(data=>{
        alert("Booked 💰");
    });
}
</script>

</body>
</html>
